<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <section class="mydata">
        <h1>Sign up</h1>
        <form class="myform">
            <label><i class="fa-solid fa-circle-user"></i>Username</label>
        <input type="text" id='username' placeholder="Eg:John" required/>
            <label><i class="fa-solid fa-envelope"></i>Email</label>
        <input type="text" id='signupEmail' placeholder="Eg:john1@email.com" required/>
            <label><i class="fa-solid fa-phone"></i>Phone Number</label>
        <input type="text" id='ph_no' placeholder="Eg:9898756434" required/>
            <label><i class="fa-solid fa-lock"></i>Password</label>
        <input type="text" id="signupPassword" placeholder="Eg:john" required/>
            <label>Confirm Password</label>
        <input type="password" id='cpassword' placeholder="Eg:john" required/>
        </form>
        <form action="../Admin/dashboard.html">
            <button type="submit" class="btn">Sing Up</button>
        </form>
    </section>
</body>
</html>
